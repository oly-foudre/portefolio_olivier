    <script>
// === Carrousel principal ===
let currentMain = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showMainSlide(index) {
  slides.forEach((slide, i) => {
    slide.classList.toggle("active", i === index);
    dots[i].classList.toggle("active", i === index);
  });
  currentMain = index;
}

function nextMainSlide() {
  currentMain = (currentMain + 1) % slides.length;
  showMainSlide(currentMain);
}

setInterval(nextMainSlide, 5000);
const carousels = document.querySelectorAll('.car');

carousels.forEach((car, carIndex) => {
const containers = car.querySelectorAll('.img-container');
const pts = car.querySelectorAll('.pt');
let current = 0;

containers.forEach(container => {
const img = container.querySelector('.img');
if (img) {
  img.addEventListener('click', () => {
    current = (current + 1) % containers.length;
    showCarSlide(current, carIndex);
  });
}
});

showCarSlide(0, carIndex);
});

function showCarSlide(index, carIndex) {
const car = document.querySelectorAll('.car')[carIndex];
const containers = car.querySelectorAll('.img-container');
const pts = car.querySelectorAll('.pt');

containers.forEach((container, i) => {
container.classList.toggle('active', i === index);

const img = container.querySelector('.img');
if (img && img.tagName === 'VIDEO') {
  if (i === index) img.play();
  else img.pause();
}
});

pts.forEach((pt, i) => {
pt.classList.toggle('active', i === index);
});
}

</script>
